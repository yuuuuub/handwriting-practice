<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉字书写练习 - Handwriting Practice</title>
<style>
  :root {
    --bg: #1a1a2e;
    --bg-card: #16213e;
    --bg-input: #0f3460;
    --text: #e0e0e0;
    --text-dim: #a0a0a0;
    --accent: #e94560;
    --accent-hover: #ff6b81;
    --gold: #c9a96e;
    --gold-light: #f0d78c;
    --border: #2a2a4a;
    --grid-color: rgba(201, 169, 110, 0.3);
    --guide-color: rgba(201, 169, 110, 0.15);
    --tag-bg: #1a3a5c;
    --success: #2ecc71;
    --warning: #f39c12;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(233, 69, 96, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(201, 169, 110, 0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 0 30px;
    position: relative;
  }

  .header::after {
    content: '';
    display: block;
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 16px auto 0;
  }

  .header h1 {
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 6px;
    text-shadow: 0 0 20px rgba(201, 169, 110, 0.2);
  }

  .header .subtitle {
    font-size: 0.95rem;
    color: var(--text-dim);
    margin-top: 8px;
    letter-spacing: 2px;
  }

  /* Card */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  }

  .card-title {
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--gold);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    letter-spacing: 2px;
  }

  /* Input section */
  .input-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .char-input {
    flex: 1;
    min-width: 250px;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-input);
    color: var(--text);
    font-size: 1.1rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.3s;
  }

  .char-input:focus {
    border-color: var(--accent);
  }

  .char-input::placeholder {
    color: #555;
  }

  .btn {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
    letter-spacing: 1px;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(233, 69, 96, 0.3);
  }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
  }

  .btn-secondary:hover {
    background: rgba(201, 169, 110, 0.1);
  }

  .btn-print {
    background: transparent;
    border: 1px solid var(--success);
    color: var(--success);
  }

  .btn-print:hover {
    background: rgba(46, 204, 113, 0.1);
  }

  .btn-sm {
    padding: 6px 14px;
    font-size: 0.85rem;
    border-radius: 6px;
  }

  /* Grade buttons */
  .grade-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .grade-btn {
    padding: 8px 18px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--bg-input);
    color: var(--text);
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.3s;
    font-family: inherit;
  }

  .grade-btn:hover {
    border-color: var(--accent);
    color: var(--accent-hover);
  }

  .grade-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* Character grid */
  .char-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
  }

  .char-chip {
    padding: 6px 12px;
    border-radius: 6px;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    font-size: 1rem;
    color: var(--text);
  }

  .char-chip:hover {
    border-color: var(--accent);
    background: rgba(233, 69, 96, 0.1);
  }

  .char-chip.selected {
    border-color: var(--accent);
    background: rgba(233, 69, 96, 0.2);
    color: var(--accent-hover);
  }

  /* Current character display */
  .display-area {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    align-items: flex-start;
  }

  /* Tianzige */
  .tianzige-wrapper {
    flex-shrink: 0;
  }

  .tianzige {
    width: 200px;
    height: 200px;
    position: relative;
    background: rgba(201, 169, 110, 0.03);
    border: 2px solid var(--grid-color);
    border-radius: 4px;
  }

  .tianzige::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0; left: 50%;
    width: 1px;
    background: var(--guide-color);
  }

  .tianzige::after {
    content: '';
    position: absolute;
    left: 0; right: 0; top: 50%;
    height: 1px;
    background: var(--guide-color);
  }

  .tianzige .big-char {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 120px;
    color: var(--gold-light);
    font-family: "STKaiti", "KaiTi", "楷体", serif;
    line-height: 1;
    text-shadow: 0 0 30px rgba(201, 169, 110, 0.2);
  }

  /* Info panel */
  .info-panel {
    flex: 1;
    min-width: 280px;
  }

  .info-row {
    display: flex;
    align-items: baseline;
    margin-bottom: 10px;
    flex-wrap: wrap;
    gap: 4px;
  }

  .info-label {
    font-size: 0.85rem;
    color: var(--text-dim);
    min-width: 70px;
    letter-spacing: 1px;
  }

  .info-value {
    font-size: 1rem;
    color: var(--text);
  }

  .info-value.pinyin {
    color: var(--gold);
    font-size: 1.15rem;
    font-style: italic;
  }

  .info-value.large-char {
    font-size: 1.5rem;
    color: var(--gold-light);
  }

  .stroke-order-desc {
    margin-top: 8px;
    padding: 10px 14px;
    background: var(--bg-input);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
    font-size: 0.9rem;
    color: var(--text-dim);
    line-height: 1.7;
  }

  /* Practice grid */
  .practice-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px;
    margin-top: 16px;
  }

  .practice-cell {
    width: 100px;
    height: 100px;
    position: relative;
    background: rgba(201, 169, 110, 0.02);
    border: 1px solid var(--guide-color);
    border-radius: 2px;
  }

  .practice-cell::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0; left: 50%;
    width: 1px;
    background: rgba(201, 169, 110, 0.06);
  }

  .practice-cell::after {
    content: '';
    position: absolute;
    left: 0; right: 0; top: 50%;
    height: 1px;
    background: rgba(201, 169, 110, 0.06);
  }

  .practice-cell .guide-char {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 50px;
    color: var(--guide-color);
    font-family: "STKaiti", "KaiTi", "楷体", serif;
    line-height: 1;
    pointer-events: none;
  }

  /* History */
  .history-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    font-size: 0.9rem;
  }

  .history-char {
    color: var(--gold-light);
    font-size: 1.1rem;
    cursor: pointer;
    transition: color 0.2s;
  }

  .history-char:hover {
    color: var(--accent-hover);
  }

  .history-pinyin {
    color: var(--text-dim);
    font-size: 0.8rem;
  }

  .history-time {
    color: #555;
    font-size: 0.75rem;
  }

  .empty-state {
    text-align: center;
    padding: 30px;
    color: var(--text-dim);
    font-size: 0.95rem;
  }

  /* Tools bar */
  .tools-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 30px;
    color: #444;
    font-size: 0.8rem;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .display-area { flex-direction: column; align-items: center; }
    .tianzige { width: 160px; height: 160px; }
    .tianzige .big-char { font-size: 96px; }
    .practice-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
    .practice-cell { width: 80px; height: 80px; }
    .practice-cell .guide-char { font-size: 40px; }
    .header h1 { font-size: 1.8rem; }
  }

  /* Print styles */
  @media print {
    body { background: #fff; color: #000; }
    .card { background: #fff; border: 1px solid #ccc; box-shadow: none; break-inside: avoid; }
    .header h1 { color: #333; text-shadow: none; }
    .header::after { background: linear-gradient(90deg, transparent, #999, transparent); }
    .tianzige { border-color: #999; }
    .tianzige .big-char { color: #333; text-shadow: none; }
    .practice-cell { border-color: #ddd; }
    .practice-cell .guide-char { color: #ddd; }
    .btn, .grade-btn, .char-chip, .input-row, .grade-grid, .tools-bar { display: none !important; }
    .info-value.pinyin { color: #555; }
    .card-title { color: #333; border-bottom-color: #ddd; }
    .no-print { display: none !important; }
  }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>汉字书写练习</h1>
    <p class="subtitle">汉字书写练习</p>
  </div>

  <!-- Input Section -->
  <div class="card">
    <div class="card-title">输入汉字</div>
    <div class="input-row">
      <input type="text" class="char-input" id="charInput"
             placeholder="请输入要练习的汉字，多个字用空格分隔..."
             maxlength="60">
      <button class="btn btn-primary" onclick="addCustomChars()">开始练习</button>
      <button class="btn btn-secondary" onclick="addAllFromGrade()">添加当前年级全部字</button>
    </div>
  </div>

  <!-- Grade Selection -->
  <div class="card">
    <div class="card-title">按年级选择常用字</div>
    <div class="grade-grid" id="gradeButtons"></div>
    <div class="char-grid" id="charChips"></div>
  </div>

  <!-- Main Display -->
  <div class="card" id="displayCard" style="display:none;">
    <div class="card-title" id="displayTitle">当前汉字</div>
    <div class="tools-bar no-print">
      <button class="btn btn-sm btn-secondary" onclick="prevChar()">&#8592; 上一个</button>
      <button class="btn btn-sm btn-secondary" onclick="nextChar()">下一个 &#8594;</button>
      <button class="btn btn-sm btn-print" onclick="window.print()">&#128424; 打印</button>
      <button class="btn btn-sm btn-secondary" onclick="clearHistory()">清空记录</button>
    </div>
    <div class="display-area">
      <div class="tianzige-wrapper">
        <div class="tianzige">
          <span class="big-char" id="bigChar"></span>
        </div>
      </div>
      <div class="info-panel">
        <div class="info-row">
          <span class="info-label">汉字</span>
          <span class="info-value large-char" id="infoChar"></span>
        </div>
        <div class="info-row">
          <span class="info-label">拼音</span>
          <span class="info-value pinyin" id="infoPinyin"></span>
        </div>
        <div class="info-row">
          <span class="info-label">部首</span>
          <span class="info-value" id="infoRadical"></span>
        </div>
        <div class="info-row">
          <span class="info-label">笔画数</span>
          <span class="info-value" id="infoStrokes"></span>
        </div>
        <div class="info-row">
          <span class="info-label">常用词</span>
          <span class="info-value" id="infoWords"></span>
        </div>
        <div class="stroke-order-desc" id="infoStrokeOrder"></div>
      </div>
    </div>
  </div>

  <!-- Practice Grid -->
  <div class="card" id="practiceCard" style="display:none;">
    <div class="card-title">描红练习格</div>
    <div class="practice-grid" id="practiceGrid"></div>
  </div>

  <!-- History -->
  <div class="card">
    <div class="card-title">练习记录</div>
    <div id="historyContainer">
      <div class="empty-state">还没有练习记录，输入汉字开始练习吧！</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>汉字书写练习工具 &middot; Chinese Handwriting Practice Tool</p>
  </div>
</div>

<script>
// ==================== Character Database ====================
const charData = {
  // 一年级
  '一': { pinyin: 'yī', radical: '一', strokes: 1, strokeOrder: '横（从左到右写一横）', words: '一个、一天、一起、一共' },
  '二': { pinyin: 'èr', radical: '一', strokes: 2, strokeOrder: '横、横（先写短横，再写长横）', words: '二手、二月、十二' },
  '三': { pinyin: 'sān', radical: '一', strokes: 3, strokeOrder: '横、横、横（先写短横，再写中横，最后写长横）', words: '三个、三十、三角形' },
  '四': { pinyin: 'sì', radical: '囗', strokes: 5, strokeOrder: '竖、横折、撇、竖弯、横', words: '四个、四周、四季' },
  '五': { pinyin: 'wǔ', radical: '二', strokes: 4, strokeOrder: '横、竖、横折、横', words: '五个、五彩、五月' },
  '六': { pinyin: 'liù', radical: '八', strokes: 4, strokeOrder: '点、横、撇、点', words: '六个、六月、六角形' },
  '七': { pinyin: 'qī', radical: '一', strokes: 2, strokeOrder: '横、竖弯钩', words: '七个、七月、七巧板' },
  '八': { pinyin: 'bā', radical: '八', strokes: 2, strokeOrder: '撇、捺（先撇后捺，左右相背）', words: '八个、八月、四面八方' },
  '九': { pinyin: 'jiǔ', radical: '丿', strokes: 2, strokeOrder: '撇、横折弯钩', words: '九个、九月、九牛一毛' },
  '十': { pinyin: 'shí', radical: '十', strokes: 2, strokeOrder: '横、竖（先横后竖）', words: '十个、十分、十全十美' },
  '人': { pinyin: 'rén', radical: '人', strokes: 2, strokeOrder: '撇、捺（从左上到右下，相互支撑）', words: '人们、人民、人才、人口' },
  '大': { pinyin: 'dà', radical: '大', strokes: 3, strokeOrder: '横、撇、捺', words: '大小、大家、大学、大人' },
  '天': { pinyin: 'tiān', radical: '大', strokes: 4, strokeOrder: '横、横、撇、捺', words: '今天、明天、天空、天气' },
  '日': { pinyin: 'rì', radical: '日', strokes: 4, strokeOrder: '竖、横折、横、横', words: '日子、日月、日出、日期' },
  '月': { pinyin: 'yuè', radical: '月', strokes: 4, strokeOrder: '撇、横折钩、横、横', words: '月亮、一月、月光、岁月' },
  // 二年级
  '花': { pinyin: 'huā', radical: '艹', strokes: 7, strokeOrder: '横、竖、竖、撇、竖、撇、竖弯钩', words: '花朵、花园、开花、鲜花' },
  '草': { pinyin: 'cǎo', radical: '艹', strokes: 9, strokeOrder: '横、竖、竖、竖、横折、横、横、横、竖', words: '小草、草地、草原、草莓' },
  '风': { pinyin: 'fēng', radical: '风', strokes: 4, strokeOrder: '撇、横折弯钩、撇、点', words: '大风、风雨、风景、风筝' },
  '雨': { pinyin: 'yǔ', radical: '雨', strokes: 8, strokeOrder: '横、竖、横折钩、竖、点、点、点、点', words: '下雨、雨水、雨伞、暴雨' },
  '春': { pinyin: 'chūn', radical: '日', strokes: 9, strokeOrder: '横、横、横、撇、捺、竖、横折、横、横', words: '春天、春风、春节、春季' },
  '秋': { pinyin: 'qiū', radical: '禾', strokes: 9, strokeOrder: '撇、横、竖、撇、点、点、撇、撇、捺', words: '秋天、秋风、秋季、中秋' },
  '冬': { pinyin: 'dōng', radical: '夂', strokes: 5, strokeOrder: '撇、横撇、捺、点、点', words: '冬天、冬季、冬瓜、立冬' },
  '夏': { pinyin: 'xià', radical: '夂', strokes: 10, strokeOrder: '横、撇、竖、横折、横、横、横、撇、横撇、捺', words: '夏天、夏季、华夏、盛夏' },
  '云': { pinyin: 'yún', radical: '二', strokes: 4, strokeOrder: '横、横、撇折、点', words: '白云、云朵、乌云、云端' },
  '山': { pinyin: 'shān', radical: '山', strokes: 3, strokeOrder: '竖、竖折、竖', words: '大山、上山、山峰、山水' },
  '水': { pinyin: 'shuǐ', radical: '水', strokes: 4, strokeOrder: '竖钩、横撇、撇、捺', words: '河水、水果、水杯、淡水' },
  '火': { pinyin: 'huǒ', radical: '火', strokes: 4, strokeOrder: '点、撇、撇、捺', words: '大火、火车、火山、火光' },
  '木': { pinyin: 'mù', radical: '木', strokes: 4, strokeOrder: '横、竖、撇、捺', words: '树木、木板、木头、木材' },
  '石': { pinyin: 'shí', radical: '石', strokes: 5, strokeOrder: '横、撇、竖、横折、横', words: '石头、宝石、石子、钻石' },
  '田': { pinyin: 'tián', radical: '田', strokes: 5, strokeOrder: '竖、横折、横、竖、横', words: '田地、农田、田野、水田' },
  // 三年级
  '学': { pinyin: 'xué', radical: '子', strokes: 8, strokeOrder: '点、点、撇、点、横撇、横钩、横撇/横钩、竖钩、横', words: '学习、学校、学生、上学' },
  '校': { pinyin: 'xiào', radical: '木', strokes: 10, strokeOrder: '横、竖、撇、点、点、横、撇、点、撇、捺', words: '学校、校园、校长、母校' },
  '教': { pinyin: 'jiào', radical: '攵', strokes: 11, strokeOrder: '横、竖、横、撇、横撇/横钩、竖钩、提、撇、横、撇、捺', words: '教育、教室、教师、教导' },
  '室': { pinyin: 'shì', radical: '宀', strokes: 9, strokeOrder: '点、点、横撇/横钩、横、撇折、点、横、竖、横', words: '教室、室内、办公室、卧室' },
  '读': { pinyin: 'dú', radical: '讠', strokes: 10, strokeOrder: '点、横折提、横、竖、横钩、点、点、横、撇、点', words: '读书、阅读、读音、朗读' },
  '写': { pinyin: 'xiě', radical: '冖', strokes: 5, strokeOrder: '点、横撇/横钩、横、竖折折钩、横', words: '写字、书写、写作、描写' },

const grades = {
  1: { name: '一年级', chars: '一二三四五六七八九十人大小天日月' },
  2: { name: '二年级', chars: '花草风雨春秋冬夏云山水火木石田' },
  3: { name: '三年级', chars: '学校教室读写数字语文诗画音乐体' },
  4: { name: '四年级', chars: '家国世界地图历史自然科工商市城' },
  5: { name: '五年级', chars: '创新发展文化传统民族艺术建设保护' },
  6: { name: '六年级', chars: '理想信念奋斗成功团结梦想志勇敢智慧德' },
};

let currentGrade = 1;
let practiceChars = [];
let currentIndex = 0;

// ==================== Init ====================
function init() {
  renderGradeButtons();
  selectGrade(1);
  renderHistory();
}

function renderGradeButtons() {
  const container = document.getElementById('gradeButtons');
  container.innerHTML = '';
  for (let g = 1; g <= 6; g++) {
    const btn = document.createElement('button');
    btn.className = 'grade-btn';
    btn.textContent = '小学' + g + '年级';
    btn.onclick = () => selectGrade(g);
    btn.dataset.grade = g;
    container.appendChild(btn);
  }
}

function selectGrade(grade) {
  currentGrade = grade;
  // Update button states
  document.querySelectorAll('.grade-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.grade) === grade);
  });
  // Render char chips
  const chars = grades[grade].chars;
  const container = document.getElementById('charChips');
  container.innerHTML = '';
  for (const ch of chars) {
    const chip = document.createElement('button');
    chip.className = 'char-chip';
    chip.textContent = ch;
    chip.onclick = () => {
      if (practiceChars.includes(ch)) {
        practiceChars = practiceChars.filter(c => c !== ch);
        chip.classList.remove('selected');
      } else {
        practiceChars.push(ch);
        chip.classList.add('selected');
      }
      updateDisplay();
    };
    if (practiceChars.includes(ch)) {
      chip.classList.add('selected');
    }
    container.appendChild(chip);
  }
}

function addCustomChars() {
  const input = document.getElementById('charInput');
  const raw = input.value.trim();
  if (!raw) return;
  // Extract Chinese characters
  const chars = raw.replace(/\s+/g, '').split('').filter(ch => /[\u4e00-\u9fff]/.test(ch));
  if (chars.length === 0) {
    alert('请输入有效的汉字！');
    return;
  }
  for (const ch of chars) {
    if (!practiceChars.includes(ch)) {
      practiceChars.push(ch);
    }
  }
  input.value = '';
  currentIndex = practiceChars.indexOf(chars[0]);
  if (currentIndex < 0) currentIndex = 0;
  updateDisplay();
  // Also update chip selection
  selectGrade(currentGrade);
}

function addAllFromGrade() {
  const chars = grades[currentGrade].chars;
  for (const ch of chars) {
    if (!practiceChars.includes(ch)) {
      practiceChars.push(ch);
    }
  }
  currentIndex = practiceChars.length - chars.length;
  if (currentIndex < 0) currentIndex = 0;
  updateDisplay();
  selectGrade(currentGrade);
}

function updateDisplay() {
  const displayCard = document.getElementById('displayCard');
  const practiceCard = document.getElementById('practiceCard');

  if (practiceChars.length === 0) {
    displayCard.style.display = 'none';
    practiceCard.style.display = 'none';
    return;
  }

  if (currentIndex >= practiceChars.length) currentIndex = 0;
  if (currentIndex < 0) currentIndex = practiceChars.length - 1;

  const ch = practiceChars[currentIndex];
  const info = charData[ch];

  displayCard.style.display = '';
  document.getElementById('displayTitle').textContent =
    '当前汉字 (' + (currentIndex + 1) + '/' + practiceChars.length + ')';

  document.getElementById('bigChar').textContent = ch;
  document.getElementById('infoChar').textContent = ch;

  if (info) {
    document.getElementById('infoPinyin').textContent = info.pinyin;
    document.getElementById('infoRadical').textContent = info.radical;
    document.getElementById('infoStrokes').textContent = info.strokes + ' 画';
    document.getElementById('infoWords').textContent = info.words;
    document.getElementById('infoStrokeOrder').innerHTML =
      '<strong>笔顺：</strong>' + info.strokeOrder;
  } else {
    // Basic info for characters not in our database
    document.getElementById('infoPinyin').textContent = '（未知）';
    document.getElementById('infoRadical').textContent = '（未知）';
    document.getElementById('infoStrokes').textContent = '（未知）';
    document.getElementById('infoWords').textContent = '（暂无数据）';
    document.getElementById('infoStrokeOrder').innerHTML =
      '<strong>笔顺：</strong>（暂无笔顺数据，请参考标准字帖）';
  }

  // Render practice grid
  practiceCard.style.display = '';
  const grid = document.getElementById('practiceGrid');
  grid.innerHTML = '';
  for (let i = 0; i < 12; i++) {
    const cell = document.createElement('div');
    cell.className = 'practice-cell';
    const span = document.createElement('span');
    span.className = 'guide-char';
    span.textContent = ch;
    cell.appendChild(span);
    grid.appendChild(cell);
  }

  // Add to history
  addToHistory(ch);
}

function nextChar() {
  if (practiceChars.length === 0) return;
  currentIndex = (currentIndex + 1) % practiceChars.length;
  updateDisplay();
  addToHistory(practiceChars[currentIndex]);
}

function prevChar() {
  if (practiceChars.length === 0) return;
  currentIndex = (currentIndex - 1 + practiceChars.length) % practiceChars.length;
  updateDisplay();
  addToHistory(practiceChars[currentIndex]);
}

// ==================== History ====================
function getHistory() {
  try {
    return JSON.parse(localStorage.getItem('hw_history') || '[]');
  } catch (e) {
    return [];
  }
}

function addToHistory(ch) {
  const history = getHistory();
  // Remove existing entry for this character
  const filtered = history.filter(h => h.char !== ch);
  // Add to front
  filtered.unshift({
    char: ch,
    pinyin: charData[ch] ? charData[ch].pinyin : '',
    time: new Date().toLocaleString('zh-CN'),
  });
  // Keep max 50
  const trimmed = filtered.slice(0, 50);
  localStorage.setItem('hw_history', JSON.stringify(trimmed));
  renderHistory();
}

function renderHistory() {
  const history = getHistory();
  const container = document.getElementById('historyContainer');
  if (history.length === 0) {
    container.innerHTML = '<div class="empty-state">还没有练习记录，输入汉字开始练习吧！</div>';
    return;
  }
  let html = '<div class="history-list">';
  for (const item of history) {
    html += '<div class="history-item">';
    html += '<span class="history-char" onclick="quickSelect(\'' + item.char + '\')" title="点击练习">' + item.char + '</span>';
    if (item.pinyin) {
      html += '<span class="history-pinyin">' + item.pinyin + '</span>';
    }
    html += '<span class="history-time">' + item.time + '</span>';
    html += '</div>';
  }
  html += '</div>';
  container.innerHTML = html;
}

function quickSelect(ch) {
  // Add to practice list if not present
  if (!practiceChars.includes(ch)) {
    practiceChars.push(ch);
  }
  currentIndex = practiceChars.indexOf(ch);
  updateDisplay();
  selectGrade(currentGrade);
}

function clearHistory() {
  if (confirm('确定要清空所有练习记录吗？')) {
    localStorage.removeItem('hw_history');
    renderHistory();
  }
}

// ==================== Keyboard ====================
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight') { e.preventDefault(); nextChar(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevChar(); }
});

// ==================== Start ====================
init();
</script>
